<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>

    <style>
        .container{
            height: 200px;
            width: 400px;
            background-color: blueviolet;
            border: 2px solid black;
            cursor: pointer;
            text-align: center;
            color: white;
            border-radius: 12px;
            transition: background color 0.4s ease-out;
            &&:hover{
                background-color: aqua;
            }
        }

        #postTitle, #postId, #postBody{
            text-align: center;

        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="postTitle">Title</h1>
        <div id="postId">1234</div>
        <div id="postBody">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quaerat, quas.</div>

    </div>
