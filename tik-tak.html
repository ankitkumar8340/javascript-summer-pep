<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1e1e2f;
    color: #eee;
    display: flex;
    justify-content: center;
    padding: 40px 15px;
    margin: 0;
  }
  .app {
    background: #27293d;
    width: 100%;
    max-width: 380px;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    text-align: center;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }
  #status {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 18px;
    min-height: 20px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .cell {
    background: #1e1e2f;
    border: none;
    border-radius: 10px;
    aspect-ratio: 1 / 1;
    font-size: 42px;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
    transition: background 0.15s;
  }
  .cell:hover:not(:disabled) {
    background: #33355a;
  }
  .cell:disabled {
    cursor: default;
  }
  .cell.x { color: #6c5ce7; }
  .cell.o { color: #ff6b81; }
  .cell.win {
    background: #2e7d32;
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  button.action {
    background: #6c5ce7;
    border: none;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  button.action:hover { background: #5a4bd1; }

  .scoreboard {
    display: flex;
    justify-content: space-around;
    margin-top: 18px;
    font-size: 13px;
    color: #aaa;
    border-top: 1px solid #3a3d5c;
    padding-top: 12px;
  }
  .scoreboard div span {
    display: block;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="app">
  <h1>❌⭕ Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="action" id="reset-btn">New Round</button>
    <button class="action" id="reset-score-btn">Reset Score</button>
  </div>

  <div class="scoreboard">
    <div>Player X<span id="score-x">0</span></div>
    <div>Draws<span id="score-draw">0</span></div>
    <div>Player O<span id="score-o">0</span></div>
  </div>
</div>

<script>
  // ---- State ----
  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameActive = true;
  let scores = { X: 0, O: 0, draw: 0 };




 
</script>

</body>
</html>
