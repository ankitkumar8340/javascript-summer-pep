<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1e1e2f;
    color: #eee;
    display: flex;
    justify-content: center;
    padding: 40px 15px;
    margin: 0;
  }
  .app {
    background: #27293d;
    width: 100%;
    max-width: 380px;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    text-align: center;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }
  #status {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 18px;
    min-height: 20px;
  }
 
</style>
</head>
<body>

<div class="app">
  <h1>❌⭕ Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="action" id="reset-btn">New Round</button>
    <button class="action" id="reset-score-btn">Reset Score</button>
  </div>

  <div class="scoreboard">
    <div>Player X<span id="score-x">0</span></div>
    <div>Draws<span id="score-draw">0</span></div>
    <div>Player O<span id="score-o">0</span></div>
  </div>
</div>

<script>
 




 
</script>

</body>
</html>
